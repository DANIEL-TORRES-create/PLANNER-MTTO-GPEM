<script>
/* =========================================================================
   CONFIGURACIÓN
   ========================================================================= */
// ID del grupo raíz del sistema (PLANNER MTTO), validado en el Runner.
var ROOT_GROUP_ID = 'b2D08';
// URL del Apps Script (backend) — Google Sheet conectado.
var URL_SCRIPT = 'https://script.google.com/macros/s/AKfycbzNBYgio0OPMZs9Irkfed0nvnztIkkb8c5b5hNbzfs8FbO1zgAQ0uVFoiGIEL-Ke-7Q/exec';

/* =========================================================================
   ESTADO EN MEMORIA
   ========================================================================= */
var STATE = {
  api: null,
  user: null,
  allGroups: [],
  groupsById: {},
  scopeGroupId: null,   // grupo raíz de trabajo del usuario (tras resolver GroupCompanyId)
  currentGroupId: null, // empresa actualmente seleccionada/visualizada
  level: null,           // 'super-admin' | 'sub-admin' | 'cliente'
  vehiculosActuales: [], // vehículos de la empresa actualmente vista (de Geotab)
  planesActuales: { mantenimiento: [], documentacion: [] }
};

/* =========================================================================
   COMUNICACIÓN CON APPS SCRIPT (patrón JSONP, sin problemas de CORS)
   ========================================================================= */
function fetchScript(action, params, callback) {
  var cbName = 'planner_cb_' + Date.now() + '_' + Math.floor(Math.random() * 9999);
  window[cbName] = function (data) {
    try { delete window[cbName]; } catch (e) {}
    callback(data);
  };
  var tag = document.createElement('script');
  var qs = '?action=' + encodeURIComponent(action) + '&callback=' + cbName;
  Object.keys(params || {}).forEach(function (k) {
    if (k === 'body') {
      qs += '&body=' + encodeURIComponent(JSON.stringify(params.body));
    } else {
      qs += '&' + k + '=' + encodeURIComponent(params[k]);
    }
  });
  tag.src = URL_SCRIPT + qs;
  tag.onerror = function () {
    try { tag.remove(); } catch (e) {}
    callback({ success: false, error: 'Error de red al conectar con el servidor.' });
  };
  tag.onload = function () { try { tag.remove(); } catch (e) {} };
  document.body.appendChild(tag);
}

/* =========================================================================
   HELPERS DE API (promisificando api.call)
   ========================================================================= */
function apiCall(method, params) {
  return new Promise(function (resolve, reject) {
    STATE.api.call(method, params, resolve, reject);
  });
}

function apiMultiCall(calls) {
  return new Promise(function (resolve, reject) {
    STATE.api.call('ExecuteMultiCall', { calls: calls }, resolve, reject);
  });
}

/* =========================================================================
   RESOLUCIÓN DE GRUPOS / JERARQUÍA
   ========================================================================= */
function indexGroups(groups) {
  var map = {};
  groups.forEach(function (g) { map[g.id] = g; });
  return map;
}

function isLeaf(groupId) {
  var g = STATE.groupsById[groupId];
  return !g || !g.children || g.children.length === 0;
}

function getChildren(groupId) {
  var g = STATE.groupsById[groupId];
  if (!g || !g.children) return [];
  return g.children
    .map(function (c) { return STATE.groupsById[c.id]; })
    .filter(Boolean);
}

/* Determina el nivel del usuario y su grupo raíz de trabajo */
function resolveScope(rawCompanyGroupId) {
  if (rawCompanyGroupId === 'GroupCompanyId') {
    // Super-admin: sin restricción real -> se ancla al árbol del planner
    return { level: 'super-admin', scopeGroupId: ROOT_GROUP_ID };
  }
  if (rawCompanyGroupId === ROOT_GROUP_ID) {
    // Sub-administrador: ve todas las empresas debajo de PLANNER MTTO
    return { level: 'sub-admin', scopeGroupId: ROOT_GROUP_ID };
  }
  // Cliente: su grupo específico (puede ser hoja o tener sub-categorías propias)
  return { level: 'cliente', scopeGroupId: rawCompanyGroupId };
}

/* =========================================================================
   CARGA DE VEHÍCULOS
   ========================================================================= */
function loadVehicles(groupId) {
  return apiCall('Get', {
    typeName: 'Device',
    search: { groups: [{ id: groupId }] }
  });
}

/* Trae odómetro/horómetro más reciente de una lista de devices, en batch */
function loadOdoHoro(deviceIds) {
  if (deviceIds.length === 0) return Promise.resolve({});
  var toDate = new Date().toISOString();
  var fromDate = new Date(Date.now() - 30 * 24 * 3600 * 1000).toISOString();

  var calls = [];
  deviceIds.forEach(function (id) {
    calls.push({ method: 'Get', params: {
      typeName: 'StatusData',
      search: {
        deviceSearch: { id: id },
        diagnosticSearch: { id: 'DiagnosticOdometerAdjustmentId' },
        fromDate: fromDate, toDate: toDate
      }
    }});
    calls.push({ method: 'Get', params: {
      typeName: 'StatusData',
      search: {
        deviceSearch: { id: id },
        diagnosticSearch: { id: 'DiagnosticEngineHoursAdjustmentId' },
        fromDate: fromDate, toDate: toDate
      }
    }});
  });

  return apiMultiCall(calls).then(function (result) {
    var out = {};
    deviceIds.forEach(function (id, i) {
      var odo = result[i * 2];
      var horo = result[i * 2 + 1];
      out[id] = {
        odometroKm: (odo && odo.length) ? (odo[odo.length - 1].data / 1000) : null,
        horometroHrs: (horo && horo.length) ? (horo[horo.length - 1].data / 3600) : null
      };
    });
    return out;
  });
}

/* =========================================================================
   RENDER
   ========================================================================= */
function el(tag, attrs, children) {
  var node = document.createElement(tag);
  attrs = attrs || {};
  Object.keys(attrs).forEach(function (k) {
    if (k === 'class') node.className = attrs[k];
    else if (k === 'html') node.innerHTML = attrs[k];
    else if (k === 'forceStyle') {
      Object.keys(attrs[k]).forEach(function (prop) {
        node.style.setProperty(prop, attrs[k][prop], 'important');
      });
    }
    else if (k.indexOf('on') === 0) node.addEventListener(k.slice(2), attrs[k]);
    else node.setAttribute(k, attrs[k]);
  });
  (children || []).forEach(function (c) { if (c) node.appendChild(c); });
  return node;
}

/* Estilos del panel de Planes forzados por JS (ver por qué en los
   comentarios de crearOverlay: el CSS normal, incluso con !important,
   puede terminar siendo ignorado dentro de MyGeotab). */
var EST = {
  title: { 'font-size': '15px', 'font-weight': '700', color: '#12202B', 'margin-bottom': '14px',
    display: 'flex', 'justify-content': 'space-between', 'align-items': 'center' },
  close: { cursor: 'pointer', color: '#5B6B74', 'font-size': '20px', 'line-height': '1',
    border: 'none', background: 'none' },
  tabs: { display: 'flex', gap: '8px', 'margin-bottom': '16px' },
  tab: function (activo) {
    return activo
      ? { flex: '1', padding: '9px', border: '1.5px solid #1B4B66', 'border-radius': '8px',
          background: '#EAF1F4', cursor: 'pointer', 'font-size': '12.5px', 'font-weight': '600',
          color: '#12354A', 'text-align': 'center' }
      : { flex: '1', padding: '9px', border: '1.5px solid #DFE5E8', 'border-radius': '8px',
          background: '#fff', cursor: 'pointer', 'font-size': '12.5px', 'font-weight': '600',
          color: '#5B6B74', 'text-align': 'center' };
  },
  field: { 'margin-bottom': '12px' },
  label: { display: 'block', 'font-size': '11px', 'font-weight': '600', color: '#5B6B74',
    'text-transform': 'uppercase', 'letter-spacing': '.4px', 'margin-bottom': '5px' },
  input: { width: '100%', padding: '9px 11px', border: '1px solid #DFE5E8', 'border-radius': '6px',
    'font-size': '13px', 'box-sizing': 'border-box', 'font-family': 'inherit' },
  row2: { display: 'grid', 'grid-template-columns': '1fr 1fr', gap: '10px' },
  btnPrimary: { padding: '10px 18px', 'border-radius': '8px', 'font-size': '12.5px', 'font-weight': '600',
    cursor: 'pointer', border: 'none', background: '#1B4B66', color: '#fff' },
  btnOutline: { padding: '10px 18px', 'border-radius': '8px', 'font-size': '12.5px', 'font-weight': '600',
    cursor: 'pointer', border: '1.5px solid #1B4B66', background: '#fff', color: '#1B4B66' },
  actions: { display: 'flex', gap: '8px', 'margin-top': '16px', 'justify-content': 'flex-end' },
  listaPlanes: { display: 'flex', 'flex-direction': 'column', gap: '6px', 'margin-bottom': '14px',
    'max-height': '160px', 'overflow-y': 'auto' },
  planItem: { display: 'flex', 'justify-content': 'space-between', 'align-items': 'center',
    padding: '8px 10px', border: '1px solid #DFE5E8', 'border-radius': '6px', 'font-size': '12.5px' },
  planNombre: { 'font-weight': '600', color: '#12202B' },
  planMeta: { color: '#5B6B74', 'font-size': '11px', 'font-family': "'IBM Plex Mono', monospace" },
  unidadRow: { display: 'flex', 'align-items': 'center', gap: '10px', padding: '7px 4px',
    'border-bottom': '1px solid #F0F2F5' },
  unidadLabel: { flex: '1', 'font-size': '12.5px', color: '#12202B', cursor: 'pointer' },
  checkbox: { width: '16px', height: '16px', cursor: 'pointer' },
  tabla: { width: '100%', 'border-collapse': 'collapse', 'font-size': '12px', 'margin-top': '10px' },
  th: { background: '#EAF1F4', color: '#12354A', padding: '7px', 'text-align': 'left',
    'font-size': '10.5px', 'text-transform': 'uppercase' },
  td: { padding: '6px 7px', 'border-bottom': '1px solid #F0F2F5' },
  tablaInput: { width: '100%', padding: '5px 7px', border: '1px solid #DFE5E8', 'border-radius': '4px',
    'font-size': '12px', 'box-sizing': 'border-box' },
  msgOk: { 'font-size': '12px', padding: '8px 10px', 'border-radius': '6px', 'margin-top': '10px',
    background: '#EAF6EE', color: '#3F7D58' },
  msgError: { 'font-size': '12px', padding: '8px 10px', 'border-radius': '6px', 'margin-top': '10px',
    background: '#FBEAE6', color: '#C4432B' },
  btnNuevoPlan: { background: '#1B4B66', color: '#fff', border: 'none', 'border-radius': '6px',
    padding: '6px 12px', 'font-size': '11.5px', 'font-weight': '600', cursor: 'pointer',
    display: 'flex', 'align-items': 'center', gap: '5px' }
};

function renderSessionBox() {
  var box = document.getElementById('sessionBox');
  var nameEl = document.getElementById('sessionName');
  var roleEl = document.getElementById('rolePill');
  var avatarEl = document.getElementById('avatarInitial');

  var displayName = (STATE.user && (STATE.user.firstName || STATE.user.name)) || STATE.sessionUserName || 'Usuario';
  displayName = String(displayName).trim() || 'Usuario';
  nameEl.textContent = displayName;
  avatarEl.textContent = displayName.charAt(0).toUpperCase();

  var labels = {
    'super-admin': 'Admin',
    'sub-admin': 'Sub-administrador',
    'cliente': 'Cliente'
  };
  roleEl.textContent = labels[STATE.level] || '—';
  box.dataset.shouldShow = '1';
  box.style.display = 'flex';
  forzarEstiloHeader();
}

function renderError(message) {
  var main = document.getElementById('mainContent');
  main.innerHTML = '';
  main.appendChild(el('div', { class: 'state-block' }, [
    el('div', { class: 'error-block', html: message })
  ]));
}

function renderScopeBar(container, opts) {
  var bar = el('div', { class: 'scope-bar' });
  if (opts.showBack) {
    bar.appendChild(el('span', {
      class: 'back-link',
      onclick: opts.onBack,
      html: '&larr; Cambiar de empresa'
    }));
    bar.appendChild(el('span', {}, [document.createTextNode('·')]));
  }
  bar.appendChild(el('span', {}, [document.createTextNode('Viendo:')]));
  bar.appendChild(el('b', {}, [document.createTextNode(opts.label)]));
  container.appendChild(bar);
}

function renderCompanyPicker() {
  var main = document.getElementById('mainContent');
  main.innerHTML = '';

  var wrap = el('div', {});
  renderScopeBar(wrap, {
    label: STATE.level === 'super-admin' ? 'Todas las empresas' : 'Tus empresas asignadas',
    groupId: STATE.scopeGroupId,
    showBack: false
  });
  wrap.appendChild(el('div', { class: 'section-title' }, [
    document.createTextNode('Selecciona una empresa')
  ]));

  var grid = el('div', { class: 'company-grid' });
  var children = getChildren(STATE.scopeGroupId);

  if (children.length === 0) {
    grid.appendChild(el('div', { class: 'state-block' }, [
      document.createTextNode('Este grupo aún no tiene empresas (subgrupos) creadas.')
    ]));
  }

  children.forEach(function (g) {
    var subCount = g.children ? g.children.length : 0;
    var card = el('div', {
      class: 'company-card',
      onclick: function () { selectCompany(g.id); }
    }, [
      el('div', { class: 'icon', html: '&#128188;' }),
      el('div', { class: 'cname' }, [document.createTextNode(g.name)]),
      el('div', { class: 'cmeta' }, [document.createTextNode(subCount ? subCount + ' subgrupos' : '')])
    ]);
    grid.appendChild(card);
  });

  wrap.appendChild(grid);
  main.appendChild(wrap);
}

function odometerBlock(v) {
  var showKm = v.odometroKm !== null && v.odometroKm !== undefined;
  var showHrs = v.horometroHrs !== null && v.horometroHrs !== undefined;

  var dash = el('div', { class: 'dash' });

  if (showKm) {
    dash.appendChild(el('div', { class: 'reading' }, [
      el('div', { class: 'val' }, [document.createTextNode(v.odometroKm.toLocaleString('es-PE', { maximumFractionDigits: 1 }))]),
      el('div', { class: 'lbl' }, [document.createTextNode('Odómetro (km)')])
    ]));
  }
  if (showKm && showHrs) dash.appendChild(el('div', { class: 'divider' }));
  if (showHrs) {
    dash.appendChild(el('div', { class: 'reading' }, [
      el('div', { class: 'val amber' }, [document.createTextNode(v.horometroHrs.toLocaleString('es-PE', { maximumFractionDigits: 1 }))]),
      el('div', { class: 'lbl' }, [document.createTextNode('Horómetro (hrs)')])
    ]));
  }
  if (!showKm && !showHrs) {
    dash.appendChild(el('div', { class: 'reading' }, [
      el('div', { class: 'val', style: 'color:#607079;font-size:13px;' }, [document.createTextNode('Sin lectura reciente')])
    ]));
  }
  return dash;
}

function renderFleet(groupId, groupName, vehicles, readings) {
  var main = document.getElementById('mainContent');
  main.innerHTML = '';
  STATE.vehiculosActuales = vehicles;

  var wrap = el('div', {});
  var canGoBack = STATE.level !== 'cliente' || STATE.scopeGroupId !== groupId;
  renderScopeBar(wrap, {
    label: groupName,
    groupId: groupId,
    showBack: (STATE.level === 'super-admin' || STATE.level === 'sub-admin'),
    onBack: renderCompanyPicker
  });

  var fh = el('div', { class: 'fleet-header' }, [
    el('div', { class: 'section-title', style: 'margin:0;' }, [document.createTextNode('Unidades')]),
    el('div', { style: 'display:flex;align-items:center;gap:12px;' }, [
      el('button', { forceStyle: EST.btnNuevoPlan, onclick: function () { abrirPanelPlanes(groupId); } }, [
        document.createTextNode('+ Nuevo plan / Asignar unidades')
      ]),
      el('div', { class: 'fleet-count' }, [document.createTextNode(vehicles.length + ' vehículo(s)')])
    ])
  ]);
  wrap.appendChild(fh);

  var grid = el('div', { class: 'vehicle-grid' });
  vehicles.forEach(function (v) {
    var r = readings[v.id] || {};
    var card = el('div', { class: 'vehicle-card' }, [
      el('div', { class: 'vtitle' }, [
        el('div', {}, [
          el('div', { class: 'vname' }, [document.createTextNode(v.name)])
        ]),
        el('div', { class: 'control-tag' }, [document.createTextNode('Km / Hrs')])
      ]),
      odometerBlock(r)
    ]);
    grid.appendChild(card);
  });
  wrap.appendChild(grid);
  main.appendChild(wrap);
}

/* =========================================================================
   MÓDULO: CREAR PLAN + ASIGNAR UNIDADES
   ========================================================================= */
var PANEL_STATE = { groupId: null, tipoPlan: 'Mantenimiento', planCreado: null };

function cerrarPanelPlanes() {
  var overlay = document.getElementById('pmOverlay');
  if (overlay) overlay.remove();
}

function crearOverlay() {
  cerrarPanelPlanes();
  var overlay = el('div', { class: 'pm-overlay', id: 'pmOverlay' });
  var box = el('div', { class: 'pm-box', id: 'pmBox' });
  overlay.appendChild(box);
  document.body.appendChild(overlay);

  // Igual que con el header: forzamos por JS los estilos que hacen que
  // esto sea un modal flotante de pantalla completa, porque el CSS solo
  // (aunque tenga !important) puede terminar siendo ignorado dentro de
  // MyGeotab. Esto garantiza que SIEMPRE se vea, sin importar el resto.
  var propsOverlay = {
    'position': 'fixed',
    'top': '0', 'left': '0', 'right': '0', 'bottom': '0',
    'width': '100vw', 'height': '100vh',
    'background': 'rgba(18,32,43,.55)',
    'display': 'flex',
    'align-items': 'flex-start',
    'justify-content': 'center',
    'z-index': '2147483647', // el máximo z-index posible, gana contra cualquiera
    'padding': '40px 16px',
    'overflow-y': 'auto',
    'margin': '0',
    'box-sizing': 'border-box'
  };
  Object.keys(propsOverlay).forEach(function (k) {
    overlay.style.setProperty(k, propsOverlay[k], 'important');
  });

  var propsBox = {
    'background': '#ffffff',
    'border-radius': '12px',
    'width': '100%',
    'max-width': '560px',
    'padding': '22px',
    'box-shadow': '0 12px 40px rgba(0,0,0,.35)',

  };
  Object.keys(propsBox).forEach(function (k) {

  });

  overlay.addEventListener('click', function (ev) {
    if (ev.target === overlay) cerrarPanelPlanes();
  });
  return box;
}

function guardarNuevoPlan(groupId) {
  var msgEl = document.getElementById('pmMsgPlan');
  var btn = document.getElementById('btnGuardarPlan');
  msgEl.innerHTML = '';

  if (PANEL_STATE.tipoPlan === 'Mantenimiento') {
    var intervalo = document.getElementById('campoIntervalo').value;
    var unidad = document.getElementById('campoUnidad').value;
    if (!intervalo) {
      msgEl.appendChild(el('div', { forceStyle: EST.msgError }, [document.createTextNode('Ingresa el intervalo.')]));
      return;
    }
    btn.disabled = true;
    fetchScript('crearPlanMtto', {
      body: {
        groupId: groupId,
        nombrePlan: document.getElementById('campoNombrePlan').value,
        intervalo: intervalo,
        unidad: unidad,
        tipoServicio: document.getElementById('campoTipoServicio').value
      }
    }, function (res) {
      btn.disabled = false;
      if (res.success) {
        mostrarSeleccionUnidades(res.planId, 'Mantenimiento');
      } else {
        msgEl.innerHTML = '';
        msgEl.appendChild(el('div', { forceStyle: EST.msgError }, [document.createTextNode(res.error || 'Error al guardar.')]));
      }
    });
  } else {
    var tipoDoc = document.getElementById('campoTipoDoc').value;
    if (!tipoDoc) {
      msgEl.appendChild(el('div', { forceStyle: EST.msgError }, [document.createTextNode('Ingresa el tipo de documento.')]));
      return;
    }
    btn.disabled = true;
    fetchScript('crearPlanDoc', {
      body: {
        groupId: groupId,
        tipoDocumento: tipoDoc,
        vigenciaAnios: document.getElementById('campoVigAnios').value,
        vigenciaMeses: document.getElementById('campoVigMeses').value
      }
    }, function (res) {
      btn.disabled = false;
      if (res.success) {
        mostrarSeleccionUnidades(res.planId, 'Documentación');
      } else {
        msgEl.innerHTML = '';
        msgEl.appendChild(el('div', { forceStyle: EST.msgError }, [document.createTextNode(res.error || 'Error al guardar.')]));
      }
    });
  }
}

function selectCompany(groupId) {
  STATE.currentGroupId = groupId;
  var groupName = (STATE.groupsById[groupId] || {}).name || groupId;

  var main = document.getElementById('mainContent');
  main.innerHTML = '';
  main.appendChild(el('div', { class: 'state-block' }, [
    el('div', { class: 'spinner' }),
    document.createTextNode('Cargando unidades de ' + groupName + '…')
  ]));

  loadVehicles(groupId).then(function (vehicles) {
    var ids = vehicles.map(function (v) { return v.id; });
    return loadOdoHoro(ids).then(function (readings) {
      renderFleet(groupId, groupName, vehicles, readings);
      validarLayoutResponsive('después de cargar flota de ' + groupName);
    });
  }).catch(function (err) {
    renderError('No se pudieron cargar las unidades de esta empresa.<br><code class="inline">' + (err && err.message || err) + '</code>');
  });
}

function boot() {
  // El objeto `api` lo entrega MyGeotab al inicializar el Add-In (ver geotab.addin más abajo)
  apiCall('Get', { typeName: 'User', search: { name: STATE.sessionUserName } })
    .then(function (users) {
      STATE.user = users[0];
      var rawGroupId = (STATE.user.companyGroups && STATE.user.companyGroups[0])
        ? STATE.user.companyGroups[0].id
        : 'GroupCompanyId';

      return apiCall('Get', { typeName: 'Group' }).then(function (groups) {
        STATE.allGroups = groups;
        STATE.groupsById = indexGroups(groups);

        var scope = resolveScope(rawGroupId);
        STATE.level = scope.level;
        STATE.scopeGroupId = scope.scopeGroupId;

        renderSessionBox();

        if (STATE.level === 'cliente' && isLeaf(STATE.scopeGroupId)) {
          // Cliente con grupo hoja -> directo a sus unidades, sin selector
          selectCompany(STATE.scopeGroupId);
        } else {
          // super-admin, sub-admin, o cliente con sub-categorías propias -> mostrar selector
          renderCompanyPicker();
        }

        validarLayoutResponsive('carga inicial');
      });
    })
    .catch(function (err) {
      renderError('No se pudo resolver la sesión del usuario.<br><code class="inline">' + (err && err.message || err) + '</code>');
    });
}

/* =========================================================================
   AUTODIAGNÓSTICO DE LAYOUT (se adapta solo a cualquier ancho de pantalla,
   y avisa en consola si alguna vez algo queda descuadrado)
   ========================================================================= */
function validarLayoutResponsive(motivo) {
  var header = document.querySelector('header.topbar');
  if (!header) return;

  var anchoVentana = window.innerWidth;
  var rect = header.getBoundingClientRect();
  var margenIzq = Math.round(rect.left);
  var margenDer = Math.round(anchoVentana - rect.right);
  var diferencia = Math.abs(margenIzq - margenDer);
  var hayOverflow = document.body.scrollWidth > document.body.clientWidth;

  var resultado = {
    motivo: motivo,
    anchoVentana: anchoVentana,
    margenIzquierdo: margenIzq,
    margenDerecho: margenDer,
    simetrico: diferencia <= 1,
    overflowHorizontal: hayOverflow
  };

  if (diferencia > 1 || hayOverflow) {
    console.warn('[Planner] Layout posiblemente descuadrado:', resultado);
  } else {
    console.log('[Planner] Layout OK para este ancho de pantalla:', resultado);
  }
}

// Revalida automáticamente cada vez que la ventana cambia de tamaño
// (cambio de monitor, resize, rotar pantalla, colapsar/expandir menú, etc.)
var _resizeTimeout;
window.addEventListener('resize', function () {
  clearTimeout(_resizeTimeout);
  _resizeTimeout = setTimeout(function () {
    forzarEstiloHeader();
    validarLayoutResponsive('resize / cambio de pantalla');
  }, 300);
});

/* =========================================================================
   VIGILANTE DE ESTILOS + CORRECCIÓN DE ANCHO REAL
   Descubrimos (con datos reales) que el contenedor que MyGeotab le da
   al Add-In (#app, heredado de su MAIN.checkmateContent) mide el ANCHO
   TOTAL de la ventana, pero está posicionado después del menú lateral
   — así que se desborda a la derecha exactamente lo que mide el menú.
   Por eso nunca hay que confiar en width:100%/auto: hay que calcular
   el ancho REAL disponible = ventana completa - posición izquierda real,
   y esto se recalcula cada vez (funciona igual sin importar el tamaño
   de pantalla, o si el menú lateral está expandido o colapsado).
   ========================================================================= */
function anchoSeguroDisponible() {
  var app = document.getElementById('app');
  if (!app) return window.innerWidth;
  var offsetIzquierdo = app.getBoundingClientRect().left;
  return Math.max(280, window.innerWidth - offsetIzquierdo);
}

var MARGEN_LATERAL = 16;

function forzarEstiloHeader() {
  var app = document.getElementById('app');
  var header = document.querySelector('header.topbar');
  var main = document.getElementById('mainContent');
  var footer = document.querySelector('footer.hint');
  var sessionBox = document.getElementById('sessionBox');
  if (!app || !header) return;

  var anchoSeguro = anchoSeguroDisponible();
  var anchoContenido = anchoSeguro - (MARGEN_LATERAL * 2);

  // #app pierde su padding propio: TODO el espaciado lateral pasa a
  // depender de este único cálculo, para header/main/footer por igual.
  app.style.setProperty('padding', '0', 'important');
  app.style.setProperty('max-width', anchoSeguro + 'px', 'important');
  app.style.setProperty('box-sizing', 'border-box', 'important');

  var propsHeader = {
    'margin': '16px ' + MARGEN_LATERAL + 'px 0 ' + MARGEN_LATERAL + 'px',
    'padding': '18px 24px',
    'border-radius': '10px',
    'width': anchoContenido + 'px',
    'max-width': anchoContenido + 'px',
    'box-sizing': 'border-box',
    'background': 'linear-gradient(135deg, #12354A, #1B4B66)'
  };
  Object.keys(propsHeader).forEach(function (k) {
    header.style.setProperty(k, propsHeader[k], 'important');
  });

  // main y footer usan EXACTAMENTE el mismo margen lateral que el header,
  // así quedan perfectamente alineados entre sí, sin excepción.
  if (main) {
    main.style.setProperty('padding-left', MARGEN_LATERAL + 'px', 'important');
    main.style.setProperty('padding-right', MARGEN_LATERAL + 'px', 'important');
    main.style.setProperty('box-sizing', 'border-box', 'important');
    main.style.setProperty('width', '100%', 'important');
  }
  if (footer) {
    footer.style.setProperty('padding-left', MARGEN_LATERAL + 'px', 'important');
    footer.style.setProperty('padding-right', MARGEN_LATERAL + 'px', 'important');
    footer.style.setProperty('box-sizing', 'border-box', 'important');
  }

  if (sessionBox) {
    sessionBox.style.setProperty('background', '#FFFFFF', 'important');
    sessionBox.style.setProperty('border-radius', '10px', 'important');
    sessionBox.style.setProperty('display', sessionBox.dataset.shouldShow === '1' ? 'flex' : 'none', 'important');
  }
}

// Reaplica cada segundo durante el primer minuto (cubre cualquier
// reprocesamiento tardío de MyGeotab), y luego cada 5s indefinidamente
// como red de seguridad ligera.
var _intentos = 0;
var _intervaloEstilo = setInterval(function () {
  forzarEstiloHeader();
  _intentos++;
  if (_intentos === 60) {
    clearInterval(_intervaloEstilo);
    setInterval(forzarEstiloHeader, 5000);
  }
}, 1000);

// También reacciona de inmediato si detecta cambios en el propio header
// (por si MyGeotab lo reemplaza o le toca atributos directamente).
// IMPORTANTE: como forzarEstiloHeader() modifica el mismo atributo 'style'
// que estamos observando, hace falta un candado para no retroalimentarse
// en un bucle infinito (el observador dispara la función, la función
// cambia el estilo, eso vuelve a disparar al observador...).
var _aplicandoEstilo = false;
var _observerHeader = new MutationObserver(function () {
  if (_aplicandoEstilo) return; // evita el bucle infinito
  _aplicandoEstilo = true;
  forzarEstiloHeader();
  setTimeout(function () { _aplicandoEstilo = false; }, 50);
});
function iniciarObservadorHeader() {
  var header = document.querySelector('header.topbar');
  if (header) {
    _observerHeader.observe(header, { attributes: true, attributeFilter: ['class'] });
    _observerHeader.observe(document.body, { childList: true, subtree: false });
  }
}
iniciarObservadorHeader();
forzarEstiloHeader();

/* =========================================================================
   INTEGRACIÓN CON EL FRAMEWORK DE ADD-INS DE MYGEOTAB
   ========================================================================= */
geotab.addin.plannerMantenimiento = function () {
  return {
    initialize: function (api, state, callback) {
      STATE.api = api;
      api.getSession(function (session) {
        STATE.sessionUserName = session.userName;
        boot();
      });
      callback();
    },
    focus: function (api, state) {
      // Se llama cada vez que el usuario entra a esta página del Add-In
      forzarEstiloHeader();
    },
    blur: function () {
      // Se llama al salir de la página del Add-In
    }
  };
};
